server:
  port: ${PORT:8080}
  servlet:
    context-path: /finito/api

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  mail:
    # Brevo (SMTP relay). Porta 2525 evita o bloqueio de SMTP do Railway (a 465 dava timeout).
    host: ${MAIL_HOST:smtp-relay.brevo.com}
    port: ${MAIL_PORT:2525}
    username: ${MAIL_USERNAME:b0bc1d001@smtp-brevo.com}
    password: ${MAIL_PASSWORD:P8F4zRDXcLIaAmE5}
    properties:
      mail:
        smtp:
          auth: true
          connectiontimeout: 8000
          timeout: 8000
          writetimeout: 8000
          starttls:
            enable: true

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: lancamento
        dialect: org.hibernate.dialect.PostgreSQLDialect

# Remetente ("de:") dos e-mails — DEVE ser um remetente verificado no Brevo.
finito:
  mail:
    from: ${MAIL_FROM:joanreis.dev@gmail.com}