server:
  port: ${PORT:8080}
  servlet:
    context-path: /finito/api

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  # E-mail é enviado 100% via API HTTP do Brevo (porta 443) — ver EmailServiceImpl.enviarViaBrevoApi().
  # SMTP foi removido porque o Railway bloqueia as portas SMTP (25/465/587/2525).

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: lancamento
        dialect: org.hibernate.dialect.PostgreSQLDialect

# Remetente ("de:") dos e-mails — DEVE ser um remetente verificado no Brevo.
finito:
  mail:
    from: ${MAIL_FROM:joanreis.dev@gmail.com}

# API HTTP do Brevo (porta 443) — usada para enviar e-mail, pois o Railway bloqueia SMTP.
brevo:
  api-key: ${BREVO_API_KEY:}

# Pagamento Premium via Asaas. Sandbox por padrão; em produção defina
# ASAAS_BASE_URL=https://api.asaas.com/v3 + ASAAS_API_KEY + ASAAS_WEBHOOK_TOKEN.
asaas:
  base-url: ${ASAAS_BASE_URL:https://sandbox.asaas.com/api/v3}
  api-key: ${ASAAS_API_KEY:}
  webhook-token: ${ASAAS_WEBHOOK_TOKEN:}

premium:
  valor: ${PREMIUM_VALOR:9.90}
  limite-metas: ${PREMIUM_LIMITE_METAS:1}
  limite-lancamentos-mes: ${PREMIUM_LIMITE_LANCAMENTOS_MES:25}

# Integração cross-app (TaskFlow consome). Header X-Integration-Token == este segredo.
integracao:
  token: ${INTEGRACAO_TOKEN:}

# Token da Admin API (consumida pelo painel Ordersys Admin, header X-Admin-Token).
admin:
  token: ${ADMIN_API_TOKEN:}