server:
  port: ${PORT:8080}
  servlet:
    context-path: /finito/api

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  # E-mail é enviado 100% via API HTTP do Brevo (porta 443) — ver EmailServiceImpl.enviarViaBrevoApi().
  # SMTP foi removido porque o Railway bloqueia as portas SMTP (25/465/587/2525).

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: lancamento
        dialect: org.hibernate.dialect.PostgreSQLDialect

# Remetente ("de:") dos e-mails — DEVE ser um remetente verificado no Brevo.
finito:
  mail:
    from: ${MAIL_FROM:joanreis.dev@gmail.com}

# API HTTP do Brevo (porta 443) — usada para enviar e-mail, pois o Railway bloqueia SMTP.
brevo:
  api-key: ${BREVO_API_KEY:}